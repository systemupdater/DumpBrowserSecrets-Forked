name: Build DumpBrowserSecrets

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      # Fix the post‑build copy error by creating the target folder in advance
      - name: Create output directory
        run: mkdir x64\Release

      - name: Build solution (Release, x64)
        run: |
          msbuild DumpBrowserSecrets.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload EXE and DLL
        uses: actions/upload-artifact@v4
        with:
          name: DumpBrowserSecrets
          path: |
            x64/Release/DumpBrowserSecrets.exe
            x64/Release/DllExtractChromiumSecrets.dll
